name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Prepare Windows CI log directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output\ci-logs | Out-Null
          "Windows CI logs use UTF-8 encoding." | Out-File -FilePath output\ci-logs\00-readme.log -Encoding utf8

      - name: Create Windows virtual environment
        shell: pwsh
        run: |
          $log = 'output\ci-logs\01-create-venv.log'
          'Creating Windows virtual environment' | Out-File -FilePath $log -Encoding utf8
          & py -3.12 -m venv .venv 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Capture Windows Python environment details
        shell: pwsh
        run: |
          $log = 'output\ci-logs\02-python-version.log'
          'Capturing Python version' | Out-File -FilePath $log -Encoding utf8
          & .\.venv\Scripts\python.exe -VV 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upgrade Windows packaging tools
        shell: pwsh
        run: |
          $log = 'output\ci-logs\03-pip-upgrade.log'
          'Upgrading pip, setuptools, and wheel' | Out-File -FilePath $log -Encoding utf8
          & .\.venv\Scripts\python.exe -m pip install --upgrade pip setuptools wheel 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Install Windows package dependencies
        shell: pwsh
        run: |
          $log = 'output\ci-logs\04-pip-install.log'
          'Installing package and build dependencies' | Out-File -FilePath $log -Encoding utf8
          & .\.venv\Scripts\python.exe -m pip install --verbose ".[build]" 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build Windows executable
        shell: pwsh
        run: |
          $log = 'output\ci-logs\05-pyinstaller.log'
          'Running PyInstaller' | Out-File -FilePath $log -Encoding utf8
          & .\.venv\Scripts\python.exe -m PyInstaller --noconfirm --clean scrum-updates-bot.spec 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          if (-not (Test-Path 'dist\scrum-updates-bot\scrum-updates-bot.exe')) {
            'Executable was not created at dist\scrum-updates-bot\scrum-updates-bot.exe' | Tee-Object -FilePath $log -Append
            throw 'PyInstaller completed without producing dist\\scrum-updates-bot\\scrum-updates-bot.exe'
          }

      - name: Show Windows build output
        if: always()
        shell: pwsh
        run: |
          Write-Host "dist directory"
          if (Test-Path dist) {
            Get-ChildItem -Recurse dist | Select-Object FullName, Length
          } else {
            Write-Host "dist directory not found"
          }
          Write-Host "build directory"
          if (Test-Path build) {
            Get-ChildItem -Recurse build | Select-Object FullName, Length
          } else {
            Write-Host "build directory not found"
          }
          $warnFile = 'build\scrum-updates-bot\warn-scrum-updates-bot.txt'
          if (Test-Path $warnFile) {
            Write-Host "PyInstaller warnings"
            Get-Content $warnFile
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $log = 'output\ci-logs\06-inno-setup.log'
          'Running Inno Setup' | Out-File -FilePath $log -Encoding utf8
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\scrum-updates-bot.iss 2>&1 | Tee-Object -FilePath $log -Append
          "Exit code: $LASTEXITCODE" | Tee-Object -FilePath $log -Append
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Archive Windows portable bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output\windows-portable | Out-Null
          Compress-Archive -Path dist\scrum-updates-bot\* -DestinationPath output\windows-portable\scrum-updates-bot-windows-portable.zip -Force

      - name: Upload Windows debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug-artifacts
          path: |
            output/ci-logs/**
            build/**
            dist/**
            output/windows-installer/**
          if-no-files-found: warn

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            output/windows-installer/*.exe
            output/windows-portable/*.zip

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          chmod +x scripts/*.sh

      - name: Build Linux bundle and Debian package
        run: ./scripts/install_linux.sh --deb

      - name: Archive Linux portable bundle
        run: |
          mkdir -p output/linux-portable
          tar -czf output/linux-portable/scrum-updates-bot-linux-portable.tar.gz -C dist scrum-updates-bot

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/deb/*.deb
            output/linux-portable/*.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/linux

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.zip
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.tar.gz